name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN 권한: Pages 활성화 + 배포
permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 하나만 배포
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pages를 자동으로 켜고(enablement) 소스를 GitHub Actions로 설정
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # 정적 파일(리포지토리 루트) 전체를 아티팩트로 업로드
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
