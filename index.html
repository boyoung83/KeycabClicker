<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#241b38">
<title>키캡 키링 — 딸깍딸깍</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/keycap.css">
<link rel="stylesheet" href="css/ui.css">
</head>
<body>

<div class="counter-wrap">
  <div class="counter-label">딸깍 횟수</div>
  <div class="counter-line">
    <div id="counter" class="counter" aria-live="polite">0</div>
    <button id="resetBtn" class="reset-mini" aria-label="카운터 초기화">리셋</button>
  </div>
</div>

<!-- 게임 HUD -->
<div id="gameHud" class="game-hud" hidden>
  <div id="hudBig"></div>
  <div id="hudSub"></div>
  <div id="hudRank" class="hud-rank" hidden></div>
</div>

<!-- 키캡을 누르는 히트 영역 전체 (Three.js 캔버스) -->
<main id="stage" aria-label="키캡 키링 장난감">
  <canvas id="toy" aria-hidden="true"></canvas>
</main>

<!-- 게임 모드 선택 바 -->
<nav id="modeBar" class="mode-bar" aria-label="게임 모드">
  <button data-mode="free" class="selected"><span class="mi">🎹</span><span>자유</span></button>
  <button data-mode="simon"><span class="mi">🧠</span><span>따라</span></button>
  <button data-mode="mole"><span class="mi">⚡</span><span>반짝</span></button>
  <button data-mode="speed"><span class="mi">⏱️</span><span>연타</span></button>
  <button data-mode="rhythm"><span class="mi">🎵</span><span>리듬</span></button>
</nav>

<!-- 설정 버튼 -->
<button id="settingsBtn" class="settings-btn" aria-label="설정 열기">
  <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3.2"/>
    <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.09a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.09a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/>
  </svg>
</button>

<!-- 설정 바텀 시트 -->
<div id="sheetBackdrop" class="sheet-backdrop" hidden></div>
<section id="sheet" class="sheet" hidden aria-label="설정">
  <div class="sheet-handle"></div>

  <h2>배치</h2>
  <div id="layoutPicker" class="layout-picker">
    <button class="layout-card" data-layout="row"><span class="layout-icon">▭▭▭▭</span><b>일렬</b><small>1×4</small></button>
    <button class="layout-card" data-layout="grid"><span class="layout-icon">▣</span><b>사각형</b><small>2×2</small></button>
  </div>

  <h2>스위치</h2>
  <div id="switchPicker" class="switch-picker">
    <button class="switch-card" data-switch="blue"><span class="stem-dot" style="--dot:#2f9dff"></span><b>청축</b><small>찰칵찰칵</small></button>
    <button class="switch-card" data-switch="brown"><span class="stem-dot" style="--dot:#9d7362"></span><b>갈축</b><small>톡톡</small></button>
    <button class="switch-card" data-switch="red"><span class="stem-dot" style="--dot:#ff5f5f"></span><b>적축</b><small>부드러움</small></button>
  </div>

  <h2>꾸밀 키 고르기</h2>
  <div id="keyTabs" class="key-tabs"></div>

  <h2>키캡 색상</h2>
  <div id="colorPicker" class="swatch-row"></div>

  <h2>도안 고르기</h2>
  <div id="designPicker" class="design-grid"></div>

  <h2>직접 만들기</h2>
  <div class="custom-row">
    <input id="customText" type="text" maxlength="2" placeholder="이름 (2글자)" autocomplete="off">
    <div id="textColorPicker" class="swatch-row small"></div>
  </div>

  <h2>LED 불빛</h2>
  <div id="ledPicker" class="swatch-row"></div>

  <h2>효과</h2>
  <div class="toggle-row">
    <label class="toggle"><input id="soundToggle" type="checkbox" checked><span></span> 소리</label>
    <label class="toggle" id="hapticsRow"><input id="hapticsToggle" type="checkbox" checked><span></span> 진동</label>
  </div>
  <p class="hint">📱 아이폰은 무음 모드에서 소리가 나지 않아요. 무음 스위치를 꺼 주세요!</p>
</section>

<script type="module" src="js/main.js"></script>
</body>
</html>
