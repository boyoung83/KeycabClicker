<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#ffe3ec">
<title>키캡 키링 — 딸깍딸깍</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/keycap.css">
<link rel="stylesheet" href="css/ui.css">
</head>
<body>

<div class="counter-wrap">
  <div class="counter-label">딸깍 횟수</div>
  <div id="counter" class="counter" aria-live="polite">0</div>
</div>

<!-- 키캡을 누르는 히트 영역 전체 -->
<main id="stage" aria-label="키캡 키링 장난감">
  <svg id="toy" viewBox="-115 -135 565 625" aria-hidden="true">
    <defs>
      <!-- ── 골드 메탈 (체인/클래스프) ── -->
      <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#fdf6d8"/>
        <stop offset="0.3" stop-color="#f3d98b"/>
        <stop offset="0.55" stop-color="#c99e3f"/>
        <stop offset="0.8" stop-color="#8f6f23"/>
        <stop offset="1" stop-color="#e8cd7e"/>
      </linearGradient>

      <!-- ── 아이보리 케이스 ── -->
      <linearGradient id="caseTopGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#fbf9f4"/>
        <stop offset="0.7" stop-color="#f3efe6"/>
        <stop offset="1" stop-color="#eae4d6"/>
      </linearGradient>
      <linearGradient id="caseWallGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ded7c8"/>
        <stop offset="0.5" stop-color="#cdc5b1"/>
        <stop offset="1" stop-color="#b7ae97"/>
      </linearGradient>
      <linearGradient id="caseGloss" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
        <stop offset="0.35" stop-color="#ffffff" stop-opacity="0.08"/>
        <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>

      <!-- ── 키캡 셰이딩 (색과 분리된 명암 오버레이) ── -->
      <linearGradient id="skirtShade" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ffffff" stop-opacity="0.32"/>
        <stop offset="0.35" stop-color="#ffffff" stop-opacity="0.04"/>
        <stop offset="0.85" stop-color="#000000" stop-opacity="0.12"/>
        <stop offset="1" stop-color="#000000" stop-opacity="0.26"/>
      </linearGradient>
      <radialGradient id="faceSheen" cx="0.35" cy="0.22" r="0.9">
        <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
        <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.1"/>
        <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="faceEdge" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
        <stop offset="0.75" stop-color="#000000" stop-opacity="0"/>
        <stop offset="1" stop-color="#000000" stop-opacity="0.10"/>
      </linearGradient>
      <radialGradient id="ledGrad">
        <stop offset="0" stop-color="var(--led-color)" stop-opacity="0.95"/>
        <stop offset="1" stop-color="var(--led-color)" stop-opacity="0"/>
      </radialGradient>
      <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="6"/></filter>
      <filter id="softer" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="12"/></filter>

      <!-- ── 도안 패턴 ── -->
      <pattern id="pat-dots" width="30" height="30" patternUnits="userSpaceOnUse">
        <rect width="30" height="30" fill="#ffe0ec"/><circle cx="15" cy="15" r="6.5" fill="#ff7eb0"/>
      </pattern>
      <pattern id="pat-stripes" width="26" height="26" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
        <rect width="26" height="26" fill="#dcefff"/><rect width="13" height="26" fill="#79bfff"/>
      </pattern>
      <pattern id="pat-checker" width="36" height="36" patternUnits="userSpaceOnUse">
        <rect width="36" height="36" fill="#e8fff4"/><rect width="18" height="18" fill="#8fe6bd"/>
        <rect x="18" y="18" width="18" height="18" fill="#8fe6bd"/>
      </pattern>
      <pattern id="pat-hearts" width="30" height="30" patternUnits="userSpaceOnUse">
        <rect width="30" height="30" fill="#fff3f0"/>
        <path d="M15,24 C6,17 3,11.5 6.5,8 C9.5,5.5 13.5,7 15,10 C16.5,7 20.5,5.5 23.5,8 C27,11.5 24,17 15,24 Z" fill="#ff8577"/>
      </pattern>
      <pattern id="pat-stars" width="34" height="34" patternUnits="userSpaceOnUse">
        <rect width="34" height="34" fill="#2b2f55"/>
        <path d="M17,7 L19.4,13.6 L26.4,13.8 L20.9,18.1 L22.9,24.8 L17,20.8 L11.1,24.8 L13.1,18.1 L7.6,13.8 L14.6,13.6 Z" fill="#ffd75e"/>
      </pattern>
      <pattern id="pat-rainbow" width="60" height="60" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
        <rect width="60" height="60" fill="#fff"/>
        <rect y="0" width="60" height="10" fill="#ff8a8a"/><rect y="10" width="60" height="10" fill="#ffca7a"/>
        <rect y="20" width="60" height="10" fill="#fdf389"/><rect y="30" width="60" height="10" fill="#93e6a8"/>
        <rect y="40" width="60" height="10" fill="#8ec5ff"/><rect y="50" width="60" height="10" fill="#c5a3ff"/>
      </pattern>

      <!-- 도안이 키캡 윗면 밖으로 나가지 않게 자르기 -->
      <clipPath id="faceClip"><rect x="36" y="16" width="148" height="118" rx="12"/></clipPath>

      <!-- ── 키 1개 단위 (JS가 4번 복제해서 배치) — 실물 OEM 키캡 프로필 ── -->
      <g id="keyUnit">
        <!-- 케이스에 파인 슬롯 (캡이 눌려 들어가는 구멍) -->
        <rect x="20" y="152" width="180" height="56" rx="10" fill="#26282e"/>
        <rect x="20" y="152" width="180" height="10" rx="5" fill="#15161a"/>

        <!-- LED 글로우 — 캡 뒤에서 새어나오는 헤일로 -->
        <ellipse class="led-glow" cx="110" cy="176" rx="104" ry="34" fill="url(#ledGrad)" filter="url(#soft)"/>

        <g class="cap-group">
          <!-- 스커트 (옆면) -->
          <rect x="14" y="30" width="192" height="166" rx="18" fill="var(--cap-side)"/>
          <rect x="14" y="30" width="192" height="166" rx="18" fill="url(#skirtShade)"/>
          <!-- 스커트 좌측 에지 하이라이트 -->
          <rect x="14" y="30" width="192" height="166" rx="18" fill="none"
                stroke="#ffffff" stroke-width="1.6" opacity="0.3"/>

          <!-- 윗면과 스커트 사이 접힘선 음영 -->
          <rect x="26" y="128" width="168" height="26" rx="12" fill="#000000" opacity="0.08" filter="url(#soft)"/>

          <!-- 윗면 -->
          <rect class="cap-face" x="32" y="12" width="156" height="126" rx="14" fill="var(--cap-face)"/>
          <rect x="32" y="12" width="156" height="126" rx="14" fill="url(#faceSheen)"/>
          <rect x="32" y="12" width="156" height="126" rx="14" fill="url(#faceEdge)"/>
          <rect x="32" y="12" width="156" height="126" rx="14" fill="none"
                stroke="#ffffff" stroke-width="1.6" opacity="0.45"/>

          <!-- 도안 (윗면에 인쇄) -->
          <g class="design-layer" clip-path="url(#faceClip)">
            <rect class="design-pattern" x="36" y="16" width="148" height="118" fill="url(#pat-dots)" visibility="hidden"/>
            <text class="design-text" x="110" y="78" text-anchor="middle" dominant-baseline="central"
                  font-size="68" font-weight="800" font-family="system-ui, sans-serif">🐰</text>
          </g>
        </g>

        <!-- 캡 밑 접촉 그림자 (케이스에 드리움) -->
        <ellipse class="cap-ao" cx="110" cy="200" rx="96" ry="9" fill="#4a3d2c" opacity="0.20" filter="url(#soft)"/>

        <!-- 넉넉한 히트 영역 (아이 손가락용) -->
        <rect class="hit" x="2" y="-2" width="216" height="224" fill="transparent"/>
      </g>
    </defs>

    <!-- 바닥 그림자 (이중: 넓은 앰비언트 + 진한 접촉) -->
    <ellipse id="shadowWide" cx="210" cy="460" rx="270" ry="20" fill="#b06a88" opacity="0.20" filter="url(#softer)"/>
    <ellipse id="shadowTight" cx="210" cy="454" rx="230" ry="11" fill="#8c4a5e" opacity="0.22" filter="url(#soft)"/>

    <!-- 케이스 (앞벽 → 윗면 순서로 두께 표현) -->
    <rect id="caseWall" x="-8" y="386" width="436" height="70" rx="28" fill="url(#caseWallGrad)"/>
    <rect id="caseTop" x="-8" y="44" width="436" height="374" rx="30" fill="url(#caseTopGrad)"/>
    <rect id="caseGlossRect" x="-8" y="44" width="436" height="374" rx="30" fill="url(#caseGloss)"/>
    <rect id="caseEdge" x="-8" y="44" width="436" height="374" rx="30" fill="none"
          stroke="#ffffff" stroke-width="2.5" opacity="0.65"/>

    <!-- 골드 체인 + 가재 클래스프 + 아크릴 하트 참 -->
    <g id="chain">
      <!-- 클래스프 (가재 고리) -->
      <path d="M-52,-52 C-84,-56 -100,-80 -90,-100 C-80,-118 -52,-118 -44,-99 C-38,-84 -41,-64 -52,-52 Z"
            fill="none" stroke="url(#goldGrad)" stroke-width="8.5" stroke-linejoin="round"/>
      <line x1="-70" y1="-58" x2="-54" y2="-72" stroke="#c9a24a" stroke-width="5.5" stroke-linecap="round"/>
      <circle cx="-47" cy="-57" r="4" fill="#e8cd7e"/>
      <!-- 스위블 -->
      <rect x="-49" y="-52" width="11" height="17" rx="5" transform="rotate(32 -43 -43)" fill="url(#goldGrad)"/>
      <!-- 체인 링크 -->
      <ellipse cx="-32" cy="-22" rx="8" ry="13" transform="rotate(-18 -32 -22)"
               fill="none" stroke="url(#goldGrad)" stroke-width="5"/>
      <ellipse cx="-14" cy="8" rx="8" ry="13" transform="rotate(22 -14 8)"
               fill="none" stroke="url(#goldGrad)" stroke-width="5"/>
      <!-- 케이스 러그 링 -->
      <circle cx="6" cy="36" r="11" fill="none" stroke="url(#goldGrad)" stroke-width="5.5"/>
      <!-- 아크릴 하트 참 (반투명, 체인 중간 링크에 매달림) -->
      <g id="charm">
        <circle cx="-44" cy="-8" r="5" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>
        <path d="M-52,30 C-72,16 -78,4 -71,-5 C-65,-12 -55,-10 -52,-2 C-49,-10 -39,-12 -33,-5 C-26,4 -32,16 -52,30 Z"
              fill="#ff7eb0" opacity="0.78"/>
        <path d="M-52,30 C-72,16 -78,4 -71,-5 C-65,-12 -55,-10 -52,-2 C-49,-10 -39,-12 -33,-5 C-26,4 -32,16 -52,30 Z"
              fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
        <ellipse cx="-63" cy="1" rx="6" ry="4" fill="#ffffff" opacity="0.55" transform="rotate(-28 -63 1)"/>
      </g>
    </g>

    <!-- 키 4개 (JS가 keyUnit을 복제해 채움) -->
    <g id="keys"></g>
  </svg>
</main>

<!-- 설정 버튼 -->
<button id="settingsBtn" class="settings-btn" aria-label="설정 열기">
  <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3.2"/>
    <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.09a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.09a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/>
  </svg>
</button>

<!-- 설정 바텀 시트 -->
<div id="sheetBackdrop" class="sheet-backdrop" hidden></div>
<section id="sheet" class="sheet" hidden aria-label="설정">
  <div class="sheet-handle"></div>

  <h2>배치</h2>
  <div id="layoutPicker" class="layout-picker">
    <button class="layout-card" data-layout="row"><span class="layout-icon">▭▭▭▭</span><b>일렬</b><small>1×4</small></button>
    <button class="layout-card" data-layout="grid"><span class="layout-icon">▣</span><b>사각형</b><small>2×2</small></button>
  </div>

  <h2>스위치</h2>
  <div id="switchPicker" class="switch-picker">
    <button class="switch-card" data-switch="blue"><span class="stem-dot" style="--dot:#2f9dff"></span><b>청축</b><small>찰칵찰칵</small></button>
    <button class="switch-card" data-switch="brown"><span class="stem-dot" style="--dot:#9d7362"></span><b>갈축</b><small>톡톡</small></button>
    <button class="switch-card" data-switch="red"><span class="stem-dot" style="--dot:#ff5f5f"></span><b>적축</b><small>부드러움</small></button>
  </div>

  <h2>꾸밀 키 고르기</h2>
  <div id="keyTabs" class="key-tabs"></div>

  <h2>키캡 색상</h2>
  <div id="colorPicker" class="swatch-row"></div>

  <h2>도안 고르기</h2>
  <div id="designPicker" class="design-grid"></div>

  <h2>직접 만들기</h2>
  <div class="custom-row">
    <input id="customText" type="text" maxlength="2" placeholder="이름 (2글자)" autocomplete="off">
    <div id="textColorPicker" class="swatch-row small"></div>
  </div>

  <h2>LED 불빛</h2>
  <div id="ledPicker" class="swatch-row"></div>

  <h2>효과</h2>
  <div class="toggle-row">
    <label class="toggle"><input id="soundToggle" type="checkbox" checked><span></span> 소리</label>
    <label class="toggle" id="hapticsRow"><input id="hapticsToggle" type="checkbox" checked><span></span> 진동</label>
  </div>
  <p class="hint">📱 아이폰은 무음 모드에서 소리가 나지 않아요. 무음 스위치를 꺼 주세요!</p>

  <h2>카운터</h2>
  <div class="counter-row">
    <span id="sheetCount">0</span>
    <button id="resetBtn" class="reset-btn">초기화</button>
  </div>
</section>

<script type="module" src="js/main.js"></script>
</body>
</html>
