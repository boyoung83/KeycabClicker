<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#ffe3ec">
<title>키캡 키링 — 딸깍딸깍</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/keycap.css">
<link rel="stylesheet" href="css/ui.css">
</head>
<body>

<div class="counter-wrap">
  <div class="counter-label">딸깍 횟수</div>
  <div id="counter" class="counter" aria-live="polite">0</div>
</div>

<!-- 키캡을 누르는 히트 영역 전체 -->
<main id="stage" aria-label="키캡 키링 장난감">
  <svg id="toy" viewBox="0 0 360 460" aria-hidden="true">
    <defs>
      <!-- 금속 (카라비너 / 링) -->
      <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#f2f3f7"/>
        <stop offset="0.35" stop-color="#c7c9d3"/>
        <stop offset="0.6" stop-color="#8f92a0"/>
        <stop offset="0.8" stop-color="#c2c4cf"/>
        <stop offset="1" stop-color="#e8e9f0"/>
      </linearGradient>
      <!-- 스위치 하우징 -->
      <linearGradient id="housingGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#5b606d"/>
        <stop offset="0.15" stop-color="#464a55"/>
        <stop offset="1" stop-color="#31343d"/>
      </linearGradient>
      <linearGradient id="baseGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#3d414b"/>
        <stop offset="1" stop-color="#22242b"/>
      </linearGradient>
      <!-- 키캡 셰이딩 (색과 분리된 명암 오버레이) -->
      <linearGradient id="skirtShade" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#ffffff" stop-opacity="0.4"/>
        <stop offset="0.3" stop-color="#ffffff" stop-opacity="0.06"/>
        <stop offset="0.8" stop-color="#000000" stop-opacity="0.10"/>
        <stop offset="1" stop-color="#000000" stop-opacity="0.22"/>
      </linearGradient>
      <linearGradient id="faceShade" x1="0" y1="0" x2="0.4" y2="1">
        <stop offset="0" stop-color="#ffffff" stop-opacity="0.45"/>
        <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.08"/>
        <stop offset="1" stop-color="#000000" stop-opacity="0.07"/>
      </linearGradient>
      <linearGradient id="glossStreak" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
        <stop offset="0.42" stop-color="#ffffff" stop-opacity="0.55"/>
        <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.18"/>
        <stop offset="0.62" stop-color="#ffffff" stop-opacity="0"/>
      </linearGradient>
      <radialGradient id="hotspot">
        <stop offset="0" stop-color="#ffffff" stop-opacity="0.75"/>
        <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="ledGrad">
        <stop offset="0" stop-color="var(--led-color)" stop-opacity="0.95"/>
        <stop offset="1" stop-color="var(--led-color)" stop-opacity="0"/>
      </radialGradient>
      <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
        <feGaussianBlur stdDeviation="7"/>
      </filter>
      <filter id="softer" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="12"/>
      </filter>

      <!-- 도안 패턴 -->
      <pattern id="pat-dots" width="30" height="30" patternUnits="userSpaceOnUse">
        <rect width="30" height="30" fill="#ffe0ec"/>
        <circle cx="15" cy="15" r="6.5" fill="#ff7eb0"/>
      </pattern>
      <pattern id="pat-stripes" width="26" height="26" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
        <rect width="26" height="26" fill="#dcefff"/>
        <rect width="13" height="26" fill="#79bfff"/>
      </pattern>
      <pattern id="pat-checker" width="36" height="36" patternUnits="userSpaceOnUse">
        <rect width="36" height="36" fill="#e8fff4"/>
        <rect width="18" height="18" fill="#8fe6bd"/>
        <rect x="18" y="18" width="18" height="18" fill="#8fe6bd"/>
      </pattern>
      <pattern id="pat-hearts" width="30" height="30" patternUnits="userSpaceOnUse">
        <rect width="30" height="30" fill="#fff3f0"/>
        <path d="M15,24 C6,17 3,11.5 6.5,8 C9.5,5.5 13.5,7 15,10 C16.5,7 20.5,5.5 23.5,8 C27,11.5 24,17 15,24 Z" fill="#ff8577"/>
      </pattern>
      <pattern id="pat-stars" width="34" height="34" patternUnits="userSpaceOnUse">
        <rect width="34" height="34" fill="#2b2f55"/>
        <path d="M17,7 L19.4,13.6 L26.4,13.8 L20.9,18.1 L22.9,24.8 L17,20.8 L11.1,24.8 L13.1,18.1 L7.6,13.8 L14.6,13.6 Z" fill="#ffd75e"/>
      </pattern>
      <pattern id="pat-rainbow" width="60" height="60" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
        <rect width="60" height="60" fill="#fff"/>
        <rect y="0" width="60" height="10" fill="#ff8a8a"/>
        <rect y="10" width="60" height="10" fill="#ffca7a"/>
        <rect y="20" width="60" height="10" fill="#fdf389"/>
        <rect y="30" width="60" height="10" fill="#93e6a8"/>
        <rect y="40" width="60" height="10" fill="#8ec5ff"/>
        <rect y="50" width="60" height="10" fill="#c5a3ff"/>
      </pattern>

      <!-- 도안이 키캡 윗면 밖으로 나가지 않게 자르기 -->
      <clipPath id="faceClip">
        <rect x="92" y="94" width="176" height="132" rx="26"/>
      </clipPath>
    </defs>

    <!-- 바닥 그림자 -->
    <ellipse id="toyShadow" cx="180" cy="402" rx="116" ry="14" fill="#8c4a5e" opacity="0.28" filter="url(#softer)"/>

    <!-- 키링 (카라비너 + 스플릿 링 + 스트랩) — 스트랩 끝은 키캡 모서리 뒤로 숨음 -->
    <g id="keyring">
      <!-- 카라비너 -->
      <rect x="42" y="8" width="52" height="56" rx="24" fill="none" stroke="url(#metal)" stroke-width="8"/>
      <line x1="52" y1="52" x2="76" y2="60" stroke="#b9bcc7" stroke-width="6" stroke-linecap="round"/>
      <!-- 스플릿 링 -->
      <circle cx="70" cy="76" r="15" fill="none" stroke="url(#metal)" stroke-width="5.5"/>
      <circle cx="70" cy="76" r="15" fill="none" stroke="#ffffff" stroke-width="1.4" opacity="0.5"
              stroke-dasharray="10 60"/>
      <!-- 스트랩 -->
      <path d="M102,124 C90,112 78,100 72,86" fill="none" stroke="#ff89ac" stroke-width="12" stroke-linecap="round"/>
      <path d="M102,124 C90,112 78,100 72,86" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" opacity="0.35"/>
    </g>

    <!-- 스위치 베이스 + 하우징 -->
    <g id="switch">
      <rect x="84" y="346" width="192" height="46" rx="11" fill="url(#baseGrad)"/>
      <rect x="84" y="346" width="192" height="8" rx="4" fill="#ffffff" opacity="0.10"/>
      <rect x="102" y="310" width="156" height="50" rx="10" fill="url(#housingGrad)"/>
      <rect x="105" y="312" width="150" height="5" rx="2.5" fill="#ffffff" opacity="0.22"/>
      <!-- 하우징 개구부 (스템 구멍) -->
      <rect x="118" y="318" width="124" height="34" rx="7" fill="#181a20"/>
      <!-- 사이드 클립 -->
      <rect x="96" y="322" width="8" height="18" rx="3" fill="#31343d"/>
      <rect x="256" y="322" width="8" height="18" rx="3" fill="#31343d"/>
      <!-- LED 글로우 (하우징 안) -->
      <ellipse class="led-glow" cx="180" cy="334" rx="58" ry="22" fill="url(#ledGrad)" filter="url(#soft)"/>
    </g>

    <!-- 움직이는 그룹: 스템 + 키캡 -->
    <g id="capGroup">
      <!-- 스템 (+ 십자) -->
      <g id="stem">
        <rect x="172" y="296" width="16" height="44" rx="3" fill="var(--stem-color)"/>
        <rect x="156" y="312" width="48" height="14" rx="3" fill="var(--stem-color)"/>
        <rect x="172" y="296" width="16" height="6" rx="3" fill="#ffffff" opacity="0.25"/>
      </g>

      <!-- 키캡 안쪽 LED 글로우 (투명 캡을 통해 비침) -->
      <ellipse class="led-glow led-glow-cap" cx="180" cy="200" rx="82" ry="64" fill="url(#ledGrad)" filter="url(#softer)"/>

      <!-- 스커트 (옆면, 사다리꼴) -->
      <path id="skirt" d="M98,140 L262,140 L286,288 Q288,300 275,300 L85,300 Q72,300 74,288 Z"
            fill="var(--cap-tint)"/>
      <path d="M98,140 L262,140 L286,288 Q288,300 275,300 L85,300 Q72,300 74,288 Z"
            fill="url(#skirtShade)"/>
      <!-- 옆면 모서리 하이라이트 -->
      <path d="M98,142 L76,286" stroke="#ffffff" stroke-width="2.5" opacity="0.35" fill="none" stroke-linecap="round"/>
      <path d="M262,142 L284,286" stroke="#ffffff" stroke-width="2.5" opacity="0.2" fill="none" stroke-linecap="round"/>

      <!-- 윗면 -->
      <rect id="capFace" x="88" y="90" width="184" height="140" rx="28" fill="var(--cap-face)"/>
      <rect x="88" y="90" width="184" height="140" rx="28" fill="url(#faceShade)"/>

      <!-- 도안 레이어 (투명 캡 아래에 들어있는 그림) -->
      <g id="designLayer" clip-path="url(#faceClip)" filter="brightness(0.94)">
        <rect id="designPattern" x="92" y="94" width="176" height="132" fill="url(#pat-dots)" visibility="hidden"/>
        <text id="designText" x="180" y="162" text-anchor="middle" dominant-baseline="central"
              font-size="92" font-weight="700" font-family="system-ui, sans-serif">🐰</text>
      </g>

      <!-- 광택 (도안 위, 플라스틱 느낌) -->
      <g id="gloss">
        <path d="M114,92 L158,92 L124,228 L96,220 Z" fill="url(#glossStreak)"/>
        <ellipse cx="128" cy="112" rx="32" ry="15" fill="url(#hotspot)" opacity="0.65"/>
        <rect x="88" y="90" width="184" height="140" rx="28" fill="none"
              stroke="#ffffff" stroke-width="2" opacity="0.4"/>
        <rect x="90" y="92" width="180" height="136" rx="26" fill="none"
              stroke="#000000" stroke-width="1.5" opacity="0.06"/>
      </g>
    </g>
  </svg>
</main>

<!-- 설정 버튼 -->
<button id="settingsBtn" class="settings-btn" aria-label="설정 열기">
  <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="3.2"/>
    <path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h.09a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55 1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v.09a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/>
  </svg>
</button>

<!-- 설정 바텀 시트 -->
<div id="sheetBackdrop" class="sheet-backdrop" hidden></div>
<section id="sheet" class="sheet" hidden aria-label="설정">
  <div class="sheet-handle"></div>

  <h2>스위치</h2>
  <div id="switchPicker" class="switch-picker">
    <button class="switch-card" data-switch="blue">
      <span class="stem-dot" style="--dot:#2f9dff"></span>
      <b>청축</b><small>찰칵찰칵</small>
    </button>
    <button class="switch-card" data-switch="brown">
      <span class="stem-dot" style="--dot:#9d7362"></span>
      <b>갈축</b><small>톡톡</small>
    </button>
    <button class="switch-card" data-switch="red">
      <span class="stem-dot" style="--dot:#ff5f5f"></span>
      <b>적축</b><small>부드러움</small>
    </button>
  </div>

  <h2>키캡 색상</h2>
  <div id="colorPicker" class="swatch-row"></div>

  <h2>도안 고르기</h2>
  <div id="designPicker" class="design-grid"></div>

  <h2>직접 만들기</h2>
  <div class="custom-row">
    <input id="customText" type="text" maxlength="2" placeholder="이름 (2글자)" autocomplete="off">
    <div id="textColorPicker" class="swatch-row small"></div>
  </div>

  <h2>LED 불빛</h2>
  <div id="ledPicker" class="swatch-row"></div>

  <h2>효과</h2>
  <div class="toggle-row">
    <label class="toggle"><input id="soundToggle" type="checkbox" checked><span></span> 소리</label>
    <label class="toggle" id="hapticsRow"><input id="hapticsToggle" type="checkbox" checked><span></span> 진동</label>
  </div>
  <p class="hint">📱 아이폰은 무음 모드에서 소리가 나지 않아요. 무음 스위치를 꺼 주세요!</p>

  <h2>카운터</h2>
  <div class="counter-row">
    <span id="sheetCount">0</span>
    <button id="resetBtn" class="reset-btn">초기화</button>
  </div>
</section>

<script type="module" src="js/main.js"></script>
</body>
</html>
